name: Generate Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits back to the repo
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main # Checkout main to ensure we can commit back to it

      - name: Extract Version Number
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update Version in PHP Files
        run: |
          VERSION_NUM=${{ steps.get_version.outputs.VERSION }}
          FILE="ai-post-scheduler/ai-post-scheduler.php"
          sed -i "s/Version: .*/Version: $VERSION_NUM/" "$FILE"
          sed -i "s/define('AIPS_VERSION', '.*')/define('AIPS_VERSION', '$VERSION_NUM')/" "$FILE"

      #- name: Validate WordPress Readme
      #  uses: wordpress-actions/plugin-check@v1
      #  with:
      #    target: ai-post-scheduler
          # This will fail the build if the readme.txt is invalid

      - name: Commit and Push Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-post-scheduler/ai-post-scheduler.php
          git commit -m "chore: bump version to ${{ steps.get_version.outputs.VERSION }} [skip ci]"
          git push origin main

      - name: Create Versioned ZIP
        run: |
          zip -r "ai-post-scheduler-${{ github.ref_name }}.zip" ai-post-scheduler/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ai-post-scheduler-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}