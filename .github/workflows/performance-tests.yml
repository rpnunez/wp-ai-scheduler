name: Performance Tests

on:
  workflow_dispatch:
    # Allow manual trigger

concurrency:
  group: performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance-benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        ports: [3306:3306]
        env:
          MYSQL_ROOT_PASSWORD: ""
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to access main branch baseline

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, xml, curl, zip, dom, fileinfo, mysqli
          tools: composer:v2

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion mysql-client

      - name: Wait for MySQL and Prepare Database
        run: |
          ATTEMPTS=10
          until mysqladmin ping -h127.0.0.1 --silent; do
            ATTEMPTS=$((ATTEMPTS-1))
            if [ $ATTEMPTS -le 0 ]; then
              echo "MySQL did not become ready in time."
              exit 1
            fi
            echo "Waiting for MySQL to be ready..."
            sleep 5
          done

          # Create the database
          mysql -h127.0.0.1 -uroot -e "CREATE DATABASE IF NOT EXISTS wordpress_test;"

      - name: Install Composer dependencies
        run: cd ai-post-scheduler && composer install --no-interaction --prefer-dist --no-progress

      - name: Install WordPress Test Library
        run: |
          cd ai-post-scheduler
          bash bin/install-wp-tests.sh wordpress_test root '' 127.0.0.1 latest true
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress

      - name: Configure WordPress for benchmarking
        run: |
          # Install WordPress core for live environment
          cd /tmp/wordpress

          # Create wp-config.php
          cat > wp-config.php << 'EOF'
          <?php
          define('DB_NAME', 'wordpress_test');
          define('DB_USER', 'root');
          define('DB_PASSWORD', '');
          define('DB_HOST', '127.0.0.1');
          define('DB_CHARSET', 'utf8');
          define('DB_COLLATE', '');

          $table_prefix = 'wp_';

          define('WP_DEBUG', true);
          define('WP_DEBUG_LOG', false);
          define('WP_DEBUG_DISPLAY', false);

          if ( ! defined( 'ABSPATH' ) ) {
            define( 'ABSPATH', __DIR__ . '/' );
          }

          require_once ABSPATH . 'wp-settings.php';
          EOF

          # Install WordPress (run wp-cli via PHP)
          php -r "
            define('ABSPATH', '/tmp/wordpress/');
            require_once ABSPATH . 'wp-load.php';
            require_once ABSPATH . 'wp-admin/includes/upgrade.php';
            wp_install('Test Site', 'admin', 'admin@example.com', true, '', 'password');
          "

          # Create plugin symlink
          mkdir -p /tmp/wordpress/wp-content/plugins
          ln -s $GITHUB_WORKSPACE/ai-post-scheduler /tmp/wordpress/wp-content/plugins/ai-post-scheduler

          # Activate plugin
          cd /tmp/wordpress
          php -r "
            define('WP_ADMIN', true);
            define('ABSPATH', '/tmp/wordpress/');
            require_once ABSPATH . 'wp-load.php';
            require_once ABSPATH . 'wp-admin/includes/plugin.php';
            activate_plugin('ai-post-scheduler/ai-post-scheduler.php');
          "

      - name: Download baseline from main branch (if exists)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          # Try to fetch baseline from main branch
          git fetch origin main:main 2>/dev/null || true

          # Check if baseline exists on main branch
          if git show main:.github/performance-baseline.json > /dev/null 2>&1; then
            git show main:.github/performance-baseline.json > /tmp/performance-baseline.json
            echo "Baseline file downloaded from main branch"
          else
            echo "No baseline file found on main branch - will run without comparison"
          fi

      - name: Run Performance Benchmark
        run: |
          cd ai-post-scheduler

          # Run benchmark
          php bin/benchmark.php \
            --wp-core-dir=/tmp/wordpress \
            --output-file=/tmp/performance-results.json \
            $([ -f /tmp/performance-baseline.json ] && echo "--baseline-file=/tmp/performance-baseline.json" || echo "") \
            $([ "${{ github.event_name }}" == "pull_request" ] && echo "--fail-on-regression" || echo "")
        env:
          WP_CORE_DIR: /tmp/wordpress

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: /tmp/performance-results.json
          retention-days: 30

      - name: Update baseline on main branch
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        run: |
          # Create a deterministic baseline by stripping volatile per-run fields
          mkdir -p .github
          python3 -c "
import json, sys
data = json.load(open('/tmp/performance-results.json'))
data.pop('timestamp', None)
data.pop('php_version', None)
json.dump(data, open('.github/performance-baseline.json', 'w'), indent=2)
print('Baseline written (timestamp/php_version stripped)')
"

          # Commit and push if changed
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .github/performance-baseline.json

          if git diff --staged --quiet; then
            echo "No changes to baseline"
          else
            git commit -m "chore: update performance baseline [skip ci]"
            git push origin ${{ github.ref_name }}
          fi

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');

            // Read results
            let results;
            try {
              results = JSON.parse(fs.readFileSync('/tmp/performance-results.json', 'utf8'));
            } catch (e) {
              console.log('Could not read results file');
              return;
            }

            // Read baseline
            let baseline;
            try {
              baseline = JSON.parse(fs.readFileSync('/tmp/performance-baseline.json', 'utf8'));
            } catch (e) {
              baseline = null;
            }

            // Format comment
            let comment = '## Performance Benchmark Results\n\n';
            comment += '| Metric | Value |\n';
            comment += '|--------|-------|\n';
            comment += `| Total Queries | ${results.totals.queries} |\n`;
            comment += `| Peak Memory | ${(results.totals.memory_peak / (1024 * 1024)).toFixed(2)} MB |\n`;
            comment += `| Total Time | ${results.totals.wall_time.toFixed(2)} ms |\n`;

            if (baseline && baseline.totals) {
              comment += '\n### Comparison to Baseline\n\n';
              comment += '| Metric | Baseline | Current | Change |\n';
              comment += '|--------|----------|---------|--------|\n';

              const queries_change = ((results.totals.queries - baseline.totals.queries) / baseline.totals.queries * 100).toFixed(2);
              const memory_change = ((results.totals.memory_peak - baseline.totals.memory_peak) / baseline.totals.memory_peak * 100).toFixed(2);
              const time_change = ((results.totals.wall_time - baseline.totals.wall_time) / baseline.totals.wall_time * 100).toFixed(2);

              comment += `| Queries | ${baseline.totals.queries} | ${results.totals.queries} | ${queries_change}% |\n`;
              comment += `| Memory | ${(baseline.totals.memory_peak / (1024 * 1024)).toFixed(2)} MB | ${(results.totals.memory_peak / (1024 * 1024)).toFixed(2)} MB | ${memory_change}% |\n`;
              comment += `| Time | ${baseline.totals.wall_time.toFixed(2)} ms | ${results.totals.wall_time.toFixed(2)} ms | ${time_change}% |\n`;
            }

            // Post comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  performance-summary:
    name: Performance Summary
    runs-on: ubuntu-latest
    needs: performance-benchmark
    if: always()

    steps:
      - name: Check performance results
        run: |
          if [ "${{ needs.performance-benchmark.result }}" != "success" ]; then
            echo "::error::Performance benchmark failed or detected regression"
            exit 1
          fi
          echo "::notice::Performance benchmark passed - no regressions detected!"
