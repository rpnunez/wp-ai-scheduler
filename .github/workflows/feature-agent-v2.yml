name: Feature Agent Scanner v2

on:
  schedule:
    # Run weekly on Sundays
    - cron: '0 0 * * 0' 
  workflow_dispatch:
    # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  scan-and-report:
    name: Scan And Report (AST)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AST Dependencies
        run: python -m pip install tree-sitter==0.22.3 tree-sitter-php==0.22.8

      - name: Run Feature Scanner
        run: python scripts/feature_scanner_ast.py

      - name: Guard scan output exists
        run: |
          if [ ! -f scan_results.json ]; then
            echo "::error::Feature scanner did not produce scan_results.json. Check script execution logs and tree-sitter dependency install step."
            exit 1
          fi

      - name: Publish Summary to GitHub UI
        run: |
          if [ -f docs/feature-report.md ]; then
            cat docs/feature-report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload JSON Artifact for AI Agents
        uses: actions/upload-artifact@v4
        with:
          name: ai-scan-data
          path: scan_results.json
          retention-days: 14

      - name: Check for report changes
        id: check_changes
        run: |
          if git diff --quiet docs/feature-report.md; then
            echo "No changes detected in feature report"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in feature report"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH_NAME="feature-agent-v2/update-feature-report-${TIMESTAMP}"

          git checkout -b "${BRANCH_NAME}"
          git add docs/feature-report.md
          git commit -m "chore(docs): update AST feature report

          Auto-generated by Feature Agent Scanner v2.

          - Refreshed docs/feature-report.md
          - Uploaded scan_results.json as workflow artifact
          - Generated on: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          git push origin "${BRANCH_NAME}"

          gh pr create \
            --title "chore(docs): update AST feature report" \
            --body "## 🤖 Automated AST Feature Scanner Update

          This Pull Request was automatically generated by Feature Agent Scanner v2.

          ### Changes
          - Updated docs/feature-report.md with AST-based analysis results

          ### Artifacts
          - Uploaded scan_results.json as workflow artifact (ai-scan-data)

          ### Review Instructions
          1. Review docs/feature-report.md for expected issue output.
          2. Download ai-scan-data artifact if JSON details are needed.
          3. Merge if the report reflects current codebase architecture.

          ---

          *Generated at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')*" \
            --base main \
            --head "${BRANCH_NAME}"

      - name: No changes summary
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "✓ AST feature report is up to date - no Pull Request needed"
